<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .app {
      width: min(640px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 1.8rem;
    }

    .visible-title {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin: 0 0 6px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .moves {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
    }

    .move-btn {
      background: var(--primary);
      color: #ffffff;
    }

    .move-btn:hover:not(:disabled),
    .reset-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
    }

    .move-btn:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .reset-btn {
      width: 100%;
      max-width: 220px;
      margin: 0 auto 18px;
      display: block;
      background: var(--danger);
      color: #ffffff;
    }

    .reset-btn:hover:not(:disabled) {
      background: var(--danger-hover);
      box-shadow: 0 8px 16px rgba(220, 38, 38, 0.24);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f9fafb;
      padding: 14px;
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .status strong {
      display: inline-block;
      min-width: 138px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      text-align: center;
    }

    .score-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-weight: 700;
      background: #f9fafb;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="visible-title">Rock Paper Scissors</div>
    <h1>Rock Paper Scissors</h1>
    <p class="subtitle">Use your mouse or keyboard shortcuts: <strong>R</strong>ock, <strong>P</strong>aper, <strong>S</strong>cissors.</p>

    <section class="moves" aria-label="Move selection">
      <button type="button" class="move-btn" data-move="Rock">Rock</button>
      <button type="button" class="move-btn" data-move="Paper">Paper</button>
      <button type="button" class="move-btn" data-move="Scissors">Scissors</button>
    </section>

    <button type="button" id="resetScore" class="reset-btn">Reset score</button>

    <section class="status" aria-live="polite">
      <div><strong>Your choice:</strong> <span id="userChoice">-</span></div>
      <div><strong>Computer choice:</strong> <span id="computerChoice">-</span></div>
      <div><strong>Round result:</strong> <span id="roundResult">Make your move</span></div>
    </section>

    <section class="scoreboard" aria-label="Game score">
      <div class="score-item">Wins: <span id="wins">0</span></div>
      <div class="score-item">Losses: <span id="losses">0</span></div>
      <div class="score-item">Draws: <span id="draws">0</span></div>
    </section>
  </main>

  <script>
    (function () {
      const CHOICES = ["Rock", "Paper", "Scissors"];
      const WIN_MAP = {
        Rock: "Scissors",
        Paper: "Rock",
        Scissors: "Paper",
      };

      const state = {
        isLocked: false,
        score: {
          wins: 0,
          losses: 0,
          draws: 0,
        },
      };

      const elements = {
        userChoice: document.getElementById("userChoice"),
        computerChoice: document.getElementById("computerChoice"),
        roundResult: document.getElementById("roundResult"),
        wins: document.getElementById("wins"),
        losses: document.getElementById("losses"),
        draws: document.getElementById("draws"),
        moveButtons: Array.from(document.querySelectorAll("button[data-move]")),
        resetButton: document.getElementById("resetScore"),
      };

      function updateScoreView() {
        elements.wins.textContent = String(state.score.wins);
        elements.losses.textContent = String(state.score.losses);
        elements.draws.textContent = String(state.score.draws);
      }

      function setMoveButtonsState(disabled) {
        elements.moveButtons.forEach((button) => {
          button.disabled = disabled;
        });
      }

      function getComputerChoice() {
        const index = Math.floor(Math.random() * CHOICES.length);
        return CHOICES[index];
      }

      function getRoundResult(playerChoice, cpuChoice) {
        if (playerChoice === cpuChoice) {
          return "Draw";
        }
        return WIN_MAP[playerChoice] === cpuChoice ? "Win" : "Lose";
      }

      function playRound(playerChoice) {
        if (state.isLocked) {
          return;
        }

        if (!CHOICES.includes(playerChoice)) {
          elements.roundResult.textContent = "Invalid move ignored";
          return;
        }

        state.isLocked = true;
        setMoveButtonsState(true);

        const cpuChoice = getComputerChoice();
        const result = getRoundResult(playerChoice, cpuChoice);

        elements.userChoice.textContent = playerChoice;
        elements.computerChoice.textContent = cpuChoice;
        elements.roundResult.textContent = result;

        if (result === "Win") {
          state.score.wins += 1;
        } else if (result === "Lose") {
          state.score.losses += 1;
        } else {
          state.score.draws += 1;
        }

        updateScoreView();

        window.setTimeout(function () {
          state.isLocked = false;
          setMoveButtonsState(false);
        }, 100);
      }

      function resetScore() {
        state.score.wins = 0;
        state.score.losses = 0;
        state.score.draws = 0;

        elements.userChoice.textContent = "-";
        elements.computerChoice.textContent = "-";
        elements.roundResult.textContent = "Score reset";

        updateScoreView();
      }

      function onKeyDown(event) {
        if (event.repeat) {
          return;
        }

        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
          return;
        }

        const key = event.key.toLowerCase();
        const moveByKey = {
          r: "Rock",
          p: "Paper",
          s: "Scissors",
        };

        if (!Object.prototype.hasOwnProperty.call(moveByKey, key)) {
          return;
        }

        playRound(moveByKey[key]);
      }

      elements.moveButtons.forEach((button) => {
        button.addEventListener("click", function () {
          playRound(button.dataset.move);
        });
      });

      elements.resetButton.addEventListener("click", resetScore);
      document.addEventListener("keydown", onKeyDown);

      updateScoreView();
    })();
  </script>
</body>
</html>
