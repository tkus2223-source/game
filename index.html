<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Avoid (Reflex Game)</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #059669;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      padding: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.25rem, 2.5vw, 1.8rem);
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    button,
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled,
    select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      margin: 8px 0 14px;
      color: var(--muted);
    }

    .stats span strong {
      color: var(--text);
    }

    #gameArea {
      position: relative;
      height: 360px;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, #eef2ff 100%);
      user-select: none;
    }

    #target {
      position: absolute;
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(145deg, #f97316, #ea580c);
      box-shadow: 0 4px 10px rgba(234, 88, 12, 0.35);
      color: transparent;
      cursor: pointer;
      display: none;
      touch-action: manipulation;
    }

    #target:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #message {
      margin-top: 12px;
      min-height: 1.4em;
      text-align: center;
      font-weight: 700;
      color: var(--muted);
    }

    .game-over {
      color: var(--danger);
    }

    .ready {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Click Avoid (Reflex Game)</h1>

    <div class="controls">
      <button id="startBtn" type="button">Start</button>
      <button id="restartBtn" type="button">Restart</button>
      <select id="difficulty" aria-label="Select difficulty">
        <option value="easy">Easy (No auto-move)</option>
        <option value="normal" selected>Normal (1.5s auto-move)</option>
        <option value="hard">Hard (0.8s auto-move)</option>
      </select>
    </div>

    <div class="stats">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">30</strong>s</span>
    </div>

    <section id="gameArea" aria-label="Game area">
      <button id="target" type="button" aria-label="Target"></button>
    </section>

    <div id="message" class="ready">Press Start or Space to play.</div>
  </main>

  <script>
    (function () {
      const GAME_DURATION = 30;
      const TARGET_SIZE = 54;
      const MOVE_DEBOUNCE_MS = 65;

      const autoMoveRates = {
        easy: 0,
        normal: 1500,
        hard: 800,
      };

      const gameArea = document.getElementById('gameArea');
      const target = document.getElementById('target');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');
      const messageEl = document.getElementById('message');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const difficultySelect = document.getElementById('difficulty');

      let score = 0;
      let timeLeft = GAME_DURATION;
      let playing = false;
      let tickInterval = null;
      let autoMoveInterval = null;
      let moveLocked = false;
      let moveUnlockTimeout = null;

      function updateScore(nextScore) {
        score = Math.max(0, nextScore);
        scoreEl.textContent = String(score);
      }

      function updateTimer(nextTime) {
        timeLeft = Math.max(0, nextTime);
        timerEl.textContent = String(timeLeft);
      }

      function lockMovementTemporarily() {
        moveLocked = true;
        if (moveUnlockTimeout) {
          clearTimeout(moveUnlockTimeout);
        }
        moveUnlockTimeout = setTimeout(() => {
          moveLocked = false;
        }, MOVE_DEBOUNCE_MS);
      }

      function moveTargetRandomly() {
        if (!playing || moveLocked) return;

        const rect = gameArea.getBoundingClientRect();
        const maxX = Math.max(0, rect.width - TARGET_SIZE);
        const maxY = Math.max(0, rect.height - TARGET_SIZE);

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        lockMovementTemporarily();
        target.disabled = true;
        target.style.left = `${x}px`;
        target.style.top = `${y}px`;

        requestAnimationFrame(() => {
          if (playing) {
            target.disabled = false;
          }
        });
      }

      function clearIntervals() {
        if (tickInterval) {
          clearInterval(tickInterval);
          tickInterval = null;
        }
        if (autoMoveInterval) {
          clearInterval(autoMoveInterval);
          autoMoveInterval = null;
        }
      }

      function setupAutoMove() {
        if (autoMoveInterval) {
          clearInterval(autoMoveInterval);
          autoMoveInterval = null;
        }

        const rate = autoMoveRates[difficultySelect.value] ?? 0;
        if (rate > 0) {
          autoMoveInterval = setInterval(() => {
            moveTargetRandomly();
          }, rate);
        }
      }

      function endGame() {
        playing = false;
        clearIntervals();
        target.disabled = true;
        messageEl.textContent = `Game Over! Final score: ${score}`;
        messageEl.className = 'game-over';
        startBtn.textContent = 'Start';
        difficultySelect.disabled = false;
      }

      function startGame() {
        clearIntervals();
        playing = true;
        updateScore(0);
        updateTimer(GAME_DURATION);
        messageEl.textContent = 'Click the target. Missing costs 1 point.';
        messageEl.className = '';
        target.style.display = 'block';
        target.disabled = false;
        difficultySelect.disabled = true;
        startBtn.textContent = 'Running...';

        moveLocked = false;
        if (moveUnlockTimeout) {
          clearTimeout(moveUnlockTimeout);
          moveUnlockTimeout = null;
        }

        moveTargetRandomly();
        setupAutoMove();

        tickInterval = setInterval(() => {
          updateTimer(timeLeft - 1);
          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      function restartGame() {
        startGame();
      }

      startBtn.addEventListener('click', () => {
        if (!playing) {
          startGame();
        }
      });

      restartBtn.addEventListener('click', () => {
        restartGame();
      });

      difficultySelect.addEventListener('change', () => {
        if (playing) {
          setupAutoMove();
        }
      });

      target.addEventListener('click', (event) => {
        event.stopPropagation();
        if (!playing || target.disabled || moveLocked) return;
        updateScore(score + 1);
        moveTargetRandomly();
      });

      gameArea.addEventListener('click', (event) => {
        if (!playing) return;
        if (event.target === target) return;
        updateScore(score - 1);
      });

      document.addEventListener('keydown', (event) => {
        if (event.code !== 'Space') return;
        event.preventDefault();
        if (playing) {
          restartGame();
        } else {
          startGame();
        }
      });

      window.addEventListener('beforeunload', clearIntervals);
    })();
  </script>
</body>
</html>
